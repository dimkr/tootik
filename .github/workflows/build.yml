name: build

on:
  workflow_call:
    inputs:
      version:
        type: string

jobs:
  static:
    permissions: {}
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates gcc libc6-dev
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: |
          go generate ./migrations
          go vet ./...
          #go test ./... -failfast -vet off -tags netgo,sqlite_omit_load_extension,fts5 -race
          CGO_ENABLED=0 go test ./... -failfast -vet off -race
      - run: |
          version="${{ inputs.version }}"
          echo "TOOTIK_VERSION=${version#v}" >> "$GITHUB_ENV"
      - run: |
          CGO_ENABLED=0 go build -tags no_pprof -ldflags "-w -s -X github.com/dimkr/tootik/buildinfo.Version=${TOOTIK_VERSION}" -trimpath -o tootik-amd64 ./cmd/tootik
      - run: |
          GOARCH=arm64 CGO_ENABLED=0 go build -tags no_pprof -ldflags "-w -s -X github.com/dimkr/tootik/buildinfo.Version=${TOOTIK_VERSION}" -trimpath -o tootik-arm64 ./cmd/tootik
      - run: |
          GOARCH=arm CGO_ENABLED=0 go build -tags no_pprof -ldflags "-w -s -X github.com/dimkr/tootik/buildinfo.Version=${TOOTIK_VERSION}" -trimpath -o tootik-arm ./cmd/tootik
      - run: |
          GOARCH=386 CGO_ENABLED=0 go build -tags no_pprof -ldflags "-w -s -X github.com/dimkr/tootik/buildinfo.Version=${TOOTIK_VERSION}" -trimpath -o tootik-386 ./cmd/tootik
      - uses: actions/upload-artifact@v6
        with:
          name: tootik-${{ inputs.version }}
          path: tootik-*
          retention-days: 1
  demo:
    permissions: {}
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git ca-certificates less
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go generate ./... && TERM=xterm-256color CGO_ENABLED=0 go run ./cmd/demo -record demo.cast
      - run: go tool termsvg export demo.cast -o demo.svg -m
      - uses: actions/upload-artifact@v6
        with:
          name: demo-${{ inputs.version }}
          path: ./demo.svg
          retention-days: 1
